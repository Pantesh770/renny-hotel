  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

  <div class="dashboard-wrapper admin-dashboard-page">
    <div class="dashboard-sidebar">
      <a href="../../index.html" class="sidebar-brand">renny<span>.</span></a>
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <h6 id="userNameSidebar">Admin</h6>
          <small id="userEmailSidebar">Administrator</small>
        </div>
      </div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
        <li><a href="manage-hotels.html"><i class="fa-solid fa-building"></i> Manage Hotels</a></li>
        <li><a href="manage-users.html" class="active"><i class="fa-solid fa-users"></i> Manage Users</a></li>
        <li><a href="manage-reviews.html"><i class="fa-solid fa-star"></i> Manage Reviews</a></li>

    </div>

    <div class="dashboard-main">
      <div class="dashboard-header">
        <h2>Manage Users <small id="userCount">0 registered users</small></h2>
      </div>

      <div class="admin-table-wrapper">
        <div class="table-header">
          <h5>All Users</h5>
          <div>
            <input type="text" id="adminUserSearch" class="form-control form-control-sm d-inline-block" style="width: 200px;" placeholder="Search users...">
          </div>
        </div>
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Joined</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminUsersTable">
              <!-- Dynamic content -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
