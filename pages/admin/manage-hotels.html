<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Hotels - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

  <div class="dashboard-wrapper admin-dashboard-page">
    <div class="dashboard-sidebar">
      <a href="../../index.html" class="sidebar-brand">renny<span>.</span></a>
      <div class="sidebar-user">
        <div class="user-avatar" style="background: var(--red-500);">A</div>
        <div class="user-info">
          <h6>Admin</h6>
          <small>Administrator</small>
        </div>
      </div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
        <li><a href="manage-hotels.html" class="active"><i class="fa-solid fa-building"></i> Manage Hotels</a></li>
        <li><a href="manage-users.html"><i class="fa-solid fa-users"></i> Manage Users</a></li>
        <li><a href="manage-reviews.html"><i class="fa-solid fa-star"></i> Manage Reviews</a></li>
        <li><a href="../hotels.html"><i class="fa-solid fa-eye"></i> View Site</a></li>
        <li><a href="#" id="btnLogoutAdmin"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a></li>
      </ul>
    </div>

    <div class="dashboard-main">
      <div class="dashboard-header">
        <h2>Manage Hotels <small id="hotelCount">0 hotels total</small></h2>
        <button class="btn btn-gold btn-sm" data-bs-toggle="modal" data-bs-target="#hotelModal" onclick="prepareHotelForm()"><i class="fa-solid fa-plus me-2"></i>Add Hotel</button>
      </div>

      <div class="admin-table-wrapper">
        <div class="table-header">
          <h5>All Hotels</h5>
          <div>
            <input type="text" id="adminHotelSearch" class="form-control form-control-sm d-inline-block" style="width: 200px;" placeholder="Search hotels...">
          </div>
        </div>
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Hotel Name</th>
                <th>City</th>
                <th>Price</th>
                <th>Stars</th>
                <th>Rating</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminHotelsTable">
              <!-- Dynamic content -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Hotel Modal -->
  <div class="modal fade" id="hotelModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content" style="background: var(--navy-900); border: 1px solid var(--gold-400);">
        <div class="modal-header border-bottom border-secondary">
          <h5 class="modal-title text-gold" id="hotelModalLabel">Add Hotel</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <form id="hotelForm">
          <div class="modal-body">
            <input type="hidden" id="hotelId">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label text-white">Hotel Name</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" id="hName" required>
              </div>
              <div class="col-md-6">
                <label class="form-label text-white">City</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" id="hCity" required>
              </div>
              <div class="col-md-12">
                <label class="form-label text-white">Description</label>
                <textarea class="form-control bg-dark text-white border-secondary" id="hDesc" rows="3" required></textarea>
              </div>
              <div class="col-md-4">
                <label class="form-label text-white">Price (TSh)</label>
                <input type="number" class="form-control bg-dark text-white border-secondary" id="hPrice" required>
              </div>
              <div class="col-md-4">
                <label class="form-label text-white">Stars</label>
                <select class="form-select bg-dark text-white border-secondary" id="hStars">
                  <option value="1">1 Star</option>
                  <option value="2">2 Stars</option>
                  <option value="3">3 Stars</option>
                  <option value="4">4 Stars</option>
                  <option value="5">5 Stars</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label text-white">Rating (0-5)</label>
                <input type="number" step="0.1" class="form-control bg-dark text-white border-secondary" id="hRating">
              </div>
              <div class="col-md-6">
                <label class="form-label text-white">Address</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" id="hAddress">
              </div>
              <div class="col-md-6">
                <label class="form-label text-white">Contact</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" id="hContact">
              </div>
              <div class="col-md-12">
                <label class="form-label text-white">Main Image URL</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" id="hImage">
              </div>
              <div class="col-md-6">
                <label class="form-label text-white">Gallery Image 2 URL</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" id="hImage2">
              </div>
              <div class="col-md-6">
                <label class="form-label text-white">Gallery Image 3 URL</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" id="hImage3">
              </div>
              <div class="col-md-12">
                <label class="form-label text-white">Amenities (comma separated)</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" id="hAmenities" placeholder="Pool, Wifi, Restaurant...">
              </div>
            </div>
          </div>
          <div class="modal-footer border-top border-secondary">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-gold">Save Hotel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/recommendation.js"></script>
  <script src="../../js/main.js"></script>
</body>
</html>
