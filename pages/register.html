<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Renny</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">renny<span>.</span></a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="hotels.html">Hotels</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
        <div class="d-flex gap-2">
          <a href="login.html" class="btn btn-outline-gold btn-sm">Sign In</a>
          <a href="register.html" class="btn btn-gold btn-sm">Get Started</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="container">
      <div class="auth-card">
        <div class="auth-logo">renny<span>.</span></div>
        <p class="auth-subtitle">Create your account and start discovering hotels.</p>
        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="regName" placeholder="John Doe" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="regPassword" placeholder="Create a strong password" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="regConfirm" placeholder="Confirm your password" required>
          </div>
          <button type="submit" class="btn btn-gold w-100 py-2">Create Account</button>
        </form>
        <div class="divider">or continue with</div>
        <button class="btn-social mb-2"><i class="fa-brands fa-google me-2"></i>Google</button>
        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/recommendation.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
