<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Renny</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="dashboard-wrapper profile-page">
    <div class="dashboard-sidebar">
      <a href="../index.html" class="sidebar-brand">renny<span>.</span></a>
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info">
          <h6 id="userNameSidebar">User Name</h6>
          <small id="userEmailSidebar">user@example.com</small>
        </div>
      </div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
        <li><a href="favorites.html"><i class="fa-solid fa-heart"></i> Favorites</a></li>
        <li><a href="profile.html" class="active"><i class="fa-solid fa-user"></i> Profile</a></li>
        <li><a href="hotels.html"><i class="fa-solid fa-building"></i> Browse Hotels</a></li>
        <li><a href="#" id="btnLogoutDashboard"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a></li>
      </ul>
    </div>

    <div class="dashboard-main">
      <div class="dashboard-header">
        <h2>My Profile</h2>
      </div>

      <div class="profile-header-card mb-4">
        <div class="profile-avatar" id="profileAvatarBig">U</div>
        <div>
          <h3 id="profileNameBig">User Name</h3>
          <p><span id="profileEmailBig">user@example.com</span> · <span id="profileJoinedBig">Member since ...</span></p>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-6">
          <div class="form-card">
            <h5 class="mb-3">Personal Information</h5>
            <form id="profileForm">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="profName" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="profEmail" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-gold">Save Changes</button>
            </form>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="form-card">
            <h5 class="mb-3">Account Information</h5>
            <div class="mb-3">
              <label class="form-label d-block text-muted small">Account Type</label>
              <div class="fw-bold text-uppercase" id="profRole">User</div>
            </div>
            <div class="mb-3">
              <label class="form-label d-block text-muted small">User ID</label>
              <div class="text-secondary" id="profId">#000</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/recommendation.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
