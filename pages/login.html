<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Renny</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">renny<span>.</span></a>
      <button class="navbar-toggler text-white border-0" type="button">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="navbar-collapse">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="hotels.html">Hotels</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
        <div class="d-flex gap-2">
          <a href="login.html" class="btn btn-outline-gold btn-sm">Sign In</a>
          <a href="register.html" class="btn btn-gold btn-sm">Get Started</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="container">
      <div class="auth-card">
        <div class="auth-logo">renny<span>.</span></div>
        <p class="auth-subtitle">Welcome back! Sign in to your account.</p>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Enter your password" required>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember">
              <label class="form-check-label text-white-50" for="remember" style="color: var(--gray-400) !important;">Remember me</label>
            </div>
            <a href="#" class="text-gold" style="color: var(--gold-400); font-size: 0.9rem;">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-gold w-100 py-2">Sign In</button>
        </form>
        <div class="divider">or continue with</div>
        <button class="btn-social mb-2"><i class="fa-brands fa-google me-2"></i>Google</button>
        <div class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/recommendation.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
